<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathe-Abenteuer!</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<main>
    <!-- STARTSCREEN -->
    <section id="start-screen" class="screen" aria-label="Startbildschirm">
        <article class="card start-card">
            <h1>Mathe-Abenteuer!</h1>
            <p class="subtitle">Werde zum Mathe-Helden!</p>

            <hr class="divider">

            <label class="section-label" for="name-input">Dein Heldenname:</label>
            <input type="text" id="name-input" placeholder="Gib deinen Namen ein..." maxlength="20" autocomplete="off" aria-label="Heldenname eingeben">

            <fieldset class="selection-group">
                <legend class="section-label">Wähle deinen Helden:</legend>
                <div class="char-grid">
                    <button type="button" class="char-btn selected" data-char="Ritter" aria-label="Ritter auswählen">
                        <img src="Bilder/Char-1.png" alt="Ritter">
                    </button>

                    <button type="button" class="char-btn" data-char="Paladin" aria-label="Paladin auswählen">
                        <img src="Bilder/Char-2.png" alt="Paladin">
                    </button>

                    <button type="button" class="char-btn" data-char="Magier" aria-label="Magier auswählen">
                        <img src="Bilder/Char-3.png" alt="Magier">
                    </button>

                    <button type="button" class="char-btn" data-char="Samurai" aria-label="Samurai auswählen">
                        <img src="Bilder/Char-4.png" alt="Samurai">
                    </button>
                </div>
            </fieldset>

            <fieldset class="selection-group">
                <legend class="section-label">Wähle dein Level:</legend>
                <div class="diff-grid">
                    <button type="button" class="diff-card selected" data-diff="einfach" aria-label="Level Wald leicht auswählen">
                        <img class="diff-icon" src="Bilder/tree-icon-removebg.png" alt="Wald">
                        <span class="diff-name">Wald</span>
                        <span class="diff-ops">+ und −</span>
                        <span class="diff-badge badge-easy">Leicht</span>
                    </button>
                    <button type="button" class="diff-card" data-diff="mittel" aria-label="Level Stadt mittel auswählen">
                        <img class="diff-icon" src="Bilder/City-icon-removebg.png" alt="Stadt">
                        <span class="diff-name">Stadt</span>
                        <span class="diff-ops">× und ÷</span>
                        <span class="diff-badge badge-mittel">Mittel</span>
                    </button>
                    <button type="button" class="diff-card" data-diff="schwer" aria-label="Level Vulkan schwer auswählen">
                        <img class="diff-icon" src="Bilder/vulkan-icon-removebg.png" alt="Vulkan">
                        <span class="diff-name">Vulkan</span>
                        <span class="diff-ops">+ − × ÷</span>
                        <span class="diff-badge badge-schwer">Schwer</span>
                    </button>
                    <button type="button" class="diff-card" data-diff="extra" aria-label="Level 10er-Übergang auswählen">
                        <img class="diff-icon" src="Bilder/math-icon.jpg" alt="10er-Übergang">
                        <span class="diff-name">10er-Übergang</span>
                        <span class="diff-ops">über den Zehner</span>
                        <span class="diff-badge badge-extra">Pflicht</span>
                    </button>
                </div>
            </fieldset>

            <button type="button" id="start-btn" aria-label="Spiel starten">Los geht's!</button>
        </article>
    </section>

    <!-- SPIELSCREEN -->
    <section id="game-screen" class="screen hidden" aria-label="Spielbildschirm">
        <header class="game-bar">
            <span id="player-display">Held</span>
            <p id="hearts" aria-label="Leben">
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
            </p>
            <span aria-label="Punkte">⭐<span id="score">0</span></span>
            <span aria-label="Highscore">🏆 <span id="highscore">0</span></span>
        </header>

        <section class="enemy-area" aria-label="Gegner">
            <div class="hp-bar-wrap" aria-label="Monster-Lebensbalken">
                <div id="hp-fill"></div>
            </div>
            <div id="enemy-emoji">👾</div>
            <p id="damage-pop" class="hidden">-10 💥</p>
        </section>

        <article class="card game-card">
            <div id="timer-ring" aria-label="Verbleibende Zeit">30</div>
            <p id="question" aria-live="polite">5 + 3 = ?</p>

            <section id="choice-grid" aria-label="Antwortauswahl">
                <button type="button" class="choice-btn">1</button>
                <button type="button" class="choice-btn">2</button>
                <button type="button" class="choice-btn">3</button>
                <button type="button" class="choice-btn">4</button>
            </section>

            <section id="text-mode" class="hidden" aria-label="Antwort eintippen">
                <input type="number" id="text-input" placeholder="Antwort..." step="1" autocomplete="off" aria-label="Antwort eingeben">
                <button type="button" id="check-btn" aria-label="Antwort prüfen">✅Prüfen</button>
            </section>

            <button type="button" id="toggle-mode-btn" aria-label="Eingabemodus wechseln">⌨️ Lieber eintippen?</button>

            <p id="feedback" aria-live="polite"></p>
        </article>

        <nav class="bottom-btns" aria-label="Spielnavigation">
            <button type="button" id="new-game-btn" class="hidden" aria-label="Neues Spiel starten">🔄 Neues Spiel</button>
            <button type="button" id="back-btn" aria-label="Zurück zum Startbildschirm">↩ Zurück</button>
        </nav>
    </section>
</main>

</body>
</html>
