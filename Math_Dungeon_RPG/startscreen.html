<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
<!--    Handylayout-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--    Handylayout-->
    <title>Mathe-Abenteuer!</title>
    <link rel="preload" as="image" href="Bilder/Forest.gif">
    <link rel="preload" as="image" href="Bilder/city.gif">
    <link rel="preload" as="image" href="Bilder/vulkan.gif">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<main>

    <!-- STARTSCREEN -->
    <section id="start-screen" class="screen" aria-label="Startbildschirm">
        <article class="place start-area">
            <h1>Mathe-Abenteuer!</h1>
            <p class="subtitle">Lass dich herausfordern!</p>
            <hr class="divider">

        <!--Nameeingabe-->
            <label class="choice-label" for="name-input">Dein Heldenname:</label>
            <input type="text" id="name-input" placeholder="Gib deinen Namen ein..." maxlength="20" autocomplete="off" aria-label="Heldenname eingeben">

        <!--Figurenauswahl-->
            <fieldset class="selection-group">
            <!--Überschrift Heldenauswahl-->
                <legend class="choice-label">Wähle deinen Helden:</legend>

            <!--ungeordnete Liste für die Auswahlbuttons-->
                <ul class="char-grid">
                    <li>
                        <button type="button" class="char-btn selected" data-char="Ritter" aria-label="Ritter auswählen">
                            <img src="Bilder/Char-1.png" alt="Ritter">
                        </button>
                    </li>

                    <li>
                        <button type="button" class="char-btn" data-char="Paladin" aria-label="Paladin auswählen">
                            <img src="Bilder/Char-2.png" alt="Paladin">
                        </button>
                    </li>

                    <li>
                        <button type="button" class="char-btn" data-char="Magier" aria-label="Magier auswählen">
                            <img src="Bilder/Char-3.png" alt="Magier">
                        </button>
                    </li>

                    <li>
                        <button type="button" class="char-btn" data-char="Samurai" aria-label="Samurai auswählen">
                         <img src="Bilder/Char-4.png" alt="Samurai">
                        </button>
                    </li>
                </ul>
            </fieldset>

        <!--Level auswählen (Formularfelder)-->
            <fieldset class="selection-group">
                <!--Überschrift für Auswahl-->
                <legend class="choice-label">Wähle dein Level:</legend>

                <!--ungeordnete Liste für die Auswahlbuttons-->
                <ul class="level-grid">
                    <li>
                    <button type="button" class="level-area selected" data-level="einfach" aria-label="Level Wald leicht auswählen">
                        <img class="level-icon" src="Bilder/tree-icon-removebg.png" alt="Wald">
                        <span class="level-name">Wald</span>
                        <span class="level-ops">+ und −</span>
                        <span class="level-label label-easy">Leicht</span>
                    </button>
                    </li>

                    <li>
                    <button type="button" class="level-area" data-level="mittel" aria-label="Level Stadt mittel auswählen">
                        <img class="level-icon" src="Bilder/City-icon-removebg.png" alt="Stadt">
                        <span class="level-name">Stadt</span>
                        <span class="level-ops">× und ÷</span>
                        <span class="level-label label-mittel">Mittel</span>
                    </button>
                    </li>

                    <li>
                    <button type="button" class="level-area" data-level="schwer" aria-label="Level Vulkan schwer auswählen">
                        <img class="level-icon" src="Bilder/vulkan-icon-removebg.png" alt="Vulkan">
                        <span class="level-name">Vulkan</span>
                        <span class="level-ops">+ − × ÷</span>
                        <span class="level-label label-schwer">Schwer</span>
                    </button>
                    </li>

                    <li>
                    <button type="button" class="level-area" data-level="zehner" aria-label="Level 10er-Übergang auswählen">
                        <img class="level-icon" src="Bilder/math-icon.jpg" alt="10er-Übergang">
                        <span class="level-name">10er-Übergang</span>
                        <span class="level-ops"> Pflichtaufgabe</span>
                        <span class="level-label label-extra">Pflicht</span>
                    </button>
                    </li>
                </ul>
            </fieldset>

        <!--Spiel starten-->
            <button type="button" id="start-btn" class="startscreen-btn" aria-label="Spiel starten">Spiel Starten</button>
        <!--Rangliste anzeigen-->
            <button type="button" id="ranking-btn" class="startscreen-btn" aria-label="Rangliste öffnen">Rangliste</button>
        </article>
    </section>


    <!-- SPIELSCREEN -->
    <section id="game-screen" class="screen hidden" aria-label="Spielbildschirm">
        <!--obere Leiste, soll namen, figure, Leben, Punkte und Highscore enthalten-->
        <header class="game-bar">
            <span id="player-display">Held</span>
            <!--Lebensymbol-->
            <img id="life-display" src="Bilder/Leben3.png" alt="3 Leben" aria-label="Leben">

            <!--Sternsymbol Punkte-->
            <span class="bar-value" aria-label="Punkte">
                <img class="bar-icon" src="Bilder/punkt.png" alt="Punkte">
                <span id="score">0</span>
            </span>

            <!--Highscoresymbole Pokal-->
            <span class="bar-value" aria-label="Highscore">
                <img class="bar-icon" src="Bilder/Highscore.png" alt="Highscore">
                <span id="highscore">0</span>
            </span>
        </header>

        <!--Bereich über die Fragen, enthält Hero und Monster-->
        <section class="enemy-area" aria-label="Kampffeld">
            <!-- HP Balken von monster-->
            <progress id="monster-hp" value="100" max="100" aria-label="Monster-Lebensbalken"></progress>
            <!--links Held rechts Monster-->
            <figure class="battle-row" aria-label="Held und Monster">
                <img id="hero-image" src="Bilder/Char-1.png" alt="Ausgewählter Held">
                <img id="enemy-image" src="Bilder/Wald-Pilzmonster.png" alt="Pilzmonster">
            </figure>
            <!--Monster gets hit Texte-->
            <p id="damage" class="hidden">-10 HP</p>
        </section>

        <!--Spielbereich mit einem Zähler und 4 zufällige Aufgaben zum Auswahl-->
        <article class="place game-area">
            <!--Zeitbegrenzung-->
            <output id="countdown" aria-label="Verbleibende Zeit">30</output>
            <!--Zufällige Fragen generieren mit Platzhalter-->
            <p id="question" aria-live="polite">1111 + 1111 = ?</p>

            <!--Auswahl Antwort-->
            <section id="choice-grid" aria-label="Antwortauswahl">
                <button type="button" class="choice-btn">1</button>
                <button type="button" class="choice-btn">2</button>
                <button type="button" class="choice-btn">3</button>
                <button type="button" class="choice-btn">4</button>
            </section>

        <!--Reaktion auf Antwort, richtig, falsch oder Zeit abgelaufen-->
            <p id="feedback" aria-live="polite"></p>
        </article>

        <!--NAV für die Seiten (wenn Spiel beendet)-->
        <nav class="bottom-btns" aria-label="Spielnavigation">
            <button type="button" id="new-game-btn" class="hidden" aria-label="Neues Spiel starten">Neues Spiel</button>
            <button type="button" id="show-ranking-end-btn" class="hidden" aria-label="Rangliste anzeigen">Rangliste anzeigen</button>
            <button type="button" id="back-btn" aria-label="Zurück zum Startbildschirm">Zurück</button>
        </nav>

    </section>


    <!-- HIGHSCORE-SCREEN -->
    <section id="highscore-screen" class="screen hidden" aria-label="Rangliste">
        <article class="place highscore-area">
            <h1>Rangliste</h1>
            <hr class="divider">

            <!-- Highscore Auswahl (Wald, Stadt und Vulkan)-->
            <fieldset class="selection-group">
                <legend class="choice-label">Level:</legend>
                <ul class="level-grid highscore-level-grid">
                    <li>
                        <button type="button" class="level-area highscore-level-area selected" data-level="einfach" aria-label="Rangliste Wald leicht anzeigen">
                            <img class="level-icon" src="Bilder/tree-icon-removebg.png" alt="Wald">
                        </button>
                    </li>

                    <li>
                        <button type="button" class="level-area highscore-level-area" data-level="mittel" aria-label="Rangliste Stadt mittel anzeigen">
                            <img class="level-icon" src="Bilder/City-icon-removebg.png" alt="Stadt">
                        </button>
                    </li>

                    <li>
                        <button type="button" class="level-area highscore-level-area" data-level="schwer" aria-label="Rangliste Vulkan schwer anzeigen">
                            <img class="level-icon" src="Bilder/vulkan-icon-removebg.png" alt="Vulkan">
                        </button>
                    </li>
                </ul>
            </fieldset>

            <table id="highscore-table" aria-label="Highscore-Tabelle">
                <!--4 Elemente für Zeilenkopf-->
                <thead>
                <tr>
                    <th>Platz</th>
                    <th>Name</th>
                    <th>Punkte</th>
                    <th>Zeit</th>
                </tr>
                </thead>
                <!--4 Elemente für Body, wenn leer zeigt: Noch keine Einträge-->
                <tbody id="highscore-table-body">
                <tr>
                    <td colspan="4" class="empty-highscore">Noch keine Einträge</td>
                </tr>
                </tbody>
            </table>
            <!--Nav zum Startbild-->
            <button type="button" id="highscore-back-btn" aria-label="Zurück zum Startbildschirm">Zurück zum Start</button>
        </article>
    </section>

    <!-- ZEHNERÜBERGANG-SCREEN -->
    <section id="ten-screen" class="screen hidden" aria-label="10er-Übergang">
        <article class="place ten-area">
            <h1>10er-Übergang</h1>
            <hr class="divider">

            <!--Punkt anzeigen-->
            <p class="ten-score" aria-label="Punkte">Punkte: <span id="ten-score">0</span></p>

            <!--Frage mit Platzhalter-->
            <p id="ten-question" class="ten-question" aria-live="polite">1111 + ? = 1112</p>

            <!--Antwort eingeben(keine number wegen Pfeil)-->
            <label class="choice-label" for="ten-answer">Deine Antwort:</label>
            <input type="text" id="ten-answer" inputmode="numeric" autocomplete="off" aria-label="Antwort eingeben">

            <!--Buttons für Richtigkeitsprüfung und Tipp-->
            <button type="button" id="ten-submit-btn">Antwort prüfen</button>
            <button type="button" id="ten-tip-btn">Tipp anzeigen</button>

            <!--Tip und Reaktion auf Lösung leer, Inhalt komm später aus js-->
            <p id="ten-tip" class="ten-tip hidden" aria-live="polite"></p>
            <p id="ten-feedback" aria-live="polite"></p>

            <!--Buttons: neu Start und zurück zum Hauptmenu-->
            <nav class="bottom-btns" aria-label="10er-Übergang Navigation">
                <button type="button" id="ten-restart-btn" class="hidden">Neu starten</button>
                <button type="button" id="ten-back-btn">Zurück zum Start</button>
            </nav>

        </article>
    </section>

</main>

</body>
</html>
