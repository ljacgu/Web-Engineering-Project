<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathe-Abenteuer!</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<!-- STARTSCREEN -->
<section id="start-screen" class="screen">
    <div class="card start-card">
        <h1>🧮 Mathe-Abenteuer!</h1>
        <p class="subtitle">Werde zum Mathe-Helden! 🌟</p>

        <hr class="divider">

        <label class="section-label" for="name-input">Dein Heldenname:</label>
        <input type="text" id="name-input" placeholder="Gib deinen Namen ein..." maxlength="20" autocomplete="off">

        <span class="section-label">Wähle deinen Helden:</span>
        <div class="char-grid">
            <button class="char-btn selected" data-char="🚀">🚀</button>
            <button class="char-btn" data-char="🦊">🦊</button>
            <button class="char-btn" data-char="🐸">🐸</button>
            <button class="char-btn" data-char="🦄">🦄</button>
        </div>

        <span class="section-label">Wähle dein Level:</span>
        <div class="diff-grid">
            <div class="diff-card selected" data-diff="einfach">
                <span class="diff-emoji">🌿</span>
                <span class="diff-name">Wald</span>
                <span class="diff-ops">+ und −</span>
                <span class="diff-badge badge-easy">Leicht</span>
            </div>
            <div class="diff-card" data-diff="mittel">
                <span class="diff-emoji">🏙️</span>
                <span class="diff-name">Stadt</span>
                <span class="diff-ops">× und ÷</span>
                <span class="diff-badge badge-mittel">Mittel</span>
            </div>
            <div class="diff-card" data-diff="schwer">
                <span class="diff-emoji">🔥</span>
                <span class="diff-name">Vulkan</span>
                <span class="diff-ops">+ − × ÷</span>
                <span class="diff-badge badge-schwer">Schwer</span>
            </div>
            <div class="diff-card" data-diff="extra">
                <span class="diff-emoji">🌙</span>
                <span class="diff-name">Mondturm</span>
                <span class="diff-ops">Extra!</span>
                <span class="diff-badge badge-extra">Experte</span>
            </div>
        </div>

        <button id="start-btn">Los geht's! 🚀</button>
    </div>
</section>


<!-- SPIELSCREEN -->
<section id="game-screen" class="screen hidden">

    <header class="game-bar">
        <span id="player-display">🚀 Held</span>
        <div id="hearts">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>
        <span>⭐ <span id="score">0</span></span>
        <span>🏆 <span id="highscore">0</span></span>
    </header>

    <div class="enemy-area">
        <div class="hp-bar-wrap">
            <div id="hp-fill"></div>
        </div>
        <div id="enemy-emoji">👾</div>
        <p id="damage-pop" class="hidden">-10 💥</p>
    </div>

    <div class="card game-card">
        <div id="timer-ring">30</div>
        <p id="question">5 + 3 = ?</p>

        <div id="choice-grid">
            <button class="choice-btn">1</button>
            <button class="choice-btn">2</button>
            <button class="choice-btn">3</button>
            <button class="choice-btn">4</button>
        </div>

        <div id="text-mode" class="hidden">
            <input type="number" id="text-input" placeholder="Antwort..." step="1" autocomplete="off">
            <button id="check-btn">✔ Prüfen</button>
        </div>

        <button id="toggle-mode-btn">⌨️ Lieber eintippen?</button>

        <p id="feedback"></p>
    </div>

    <div class="bottom-btns">
        <button id="new-game-btn" class="hidden">🔄 Neues Spiel</button>
        <button id="back-btn">↩ Zurück</button>
    </div>

</section>

</body>
</html>
