<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dungeon RPG</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>

        <!-- Startscreen -->

         <section id="startscreen" class="screen">
            <article class="card">
                <h1>Math Dungeon RPG</h1>
                <p>Willkommen zum Math Dungeon RPG! </p>
                <p>Möchtest du den Dungeon beitreten und Monster mit Mathe besiegen?</p>

                <hr>

                <label class="gender-switch">
                <input type="checkbox" id="genderToggle">

                <div class="slider"></div>

                    <div class="labels">
                        <span class="label male">Male</span>
                        <span class="label female">Female</span>
                    </div>
                </label>
                <label for="spielername">Heldenname:</label>
                <input type="text" id="spielername" placeholder="Heldenname eingeben" aria-label="Heldennamen eingeben"> <!--placeholder für Spieler sichtbar, aria, für Screenreader -->
                
                <label for="modus">Modus:</label>
                <select id="modus" name="Modus auswählen">
                    <option value="noob(Addition+Subtraktion)">noob</option>
                    <option value="mittel(multi/divid)">Mittel</option>
                    <option value="Hülle">Schwer</option>
                </select>
                <br>
                <button id="start-button" aria-label="Dungeon betreten">Dungeon betreten</button>
            </article>
        </section>
             
        <!-- Spielscreen-->
        <section id="spielscreen" class="screen hidden">

            <img src="bilder/Character1.png" alt="held" class="character_img" aria-label="held">
            
                  <header class="gameBar"> 
                <div class="anzeigebar">
                    <p>Held: <span id="heldenname">[Name]</span></p>
                    <p>Punkte: <span id="punkte">0</span></p>
                    <p>Leben: <span id="leben">3</span></p>
                </div>
                </header>

            <article class="card">
                <h2>Dungeon-Kampf</h2>

           
                <hr>
                

                <p id="aufgabe"> Aufgabe erscheint hier</p>
                <p class="modus-anzeige">Rechnungsart: Addition</p>
                <p id="aufgabe" class="grosse-aufgabe">24 + 18 = ?</p>
                <p class="ziel">Besiege das Monster mit 10 richtigen Antworten!</p>

                <input type="number" id="antwort-input"  placeholder="Antwort eingeben" aria-label="Antwort eingeben">
                <button id="check-button" aria-label="Antwort prüfen"> Antwort prüfen </button>
                <p id="nachricht"></p>

            </article>

            <img src="bilder/Monster1-remove.png" alt="monster" class="monster_img" aria-label="monster">

            <!-- <button id="restart-button" class="hidden" aria-label="Neues Spiel starten">Neues Spiel starten</button> -->
           
        </section>
    </main>

        <script src="logic.js"></script>
</body>
</html>
